name: Publish @patienttrac/clinical-viewer

on:
  push:
    tags:
      - 'clinical-viewer/v*'   # trigger: git tag clinical-viewer/v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to publish to GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@patienttrac'

      - name: Install workspace deps
        run: npm ci

      - name: Build package
        working-directory: packages/clinical-viewer
        run: npm run build

      - name: Publish to GitHub Packages
        working-directory: packages/clinical-viewer
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
