[build]
  command = "vite build"
  publish = "dist"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"

# Serve landing page at root
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200

# All app routes go to React SPA
[[redirects]]
  from = "/dashboard"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/patients/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/schedule/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/billing"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/insurance"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/encounters"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/providers/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/facilities/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/settings"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/intake"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/app.html"
  status = 200

# Catch-all for React SPA
[[redirects]]
  from = "/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/hipaa"
  to = "/hipaa.html"
  status = 200
