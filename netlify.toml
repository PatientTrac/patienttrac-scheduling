# ─────────────────────────────────────────────────────────────
# PatientTracForge — Netlify Configuration
# ─────────────────────────────────────────────────────────────
# Routing strategy:
#   /                      → public marketing landing page
#   /privacy, /terms, /hipaa → static legal pages
#   /admin/*, /dashboard, /patients, etc. → React SPA (index.html)
#   Everything else        → React SPA fallback
# ─────────────────────────────────────────────────────────────

[build]
  command = "vite build"
  publish = "dist"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"

# ─────────────────────────────────────────────────────────────
# Public marketing & legal pages (must come BEFORE catch-all)
# ─────────────────────────────────────────────────────────────

[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/hipaa"
  to = "/hipaa.html"
  status = 200

# ─────────────────────────────────────────────────────────────
# React SPA routes (authenticated app)
# ─────────────────────────────────────────────────────────────

[[redirects]]
  from = "/dashboard"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/patients/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/schedule/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/billing"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/insurance"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/encounters"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/providers/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/facilities/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/settings"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/intake"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/ehi-export"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

# ─────────────────────────────────────────────────────────────
# Catch-all SPA fallback (must come LAST)
# ─────────────────────────────────────────────────────────────

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
